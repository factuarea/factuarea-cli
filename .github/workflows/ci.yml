name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build & test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt
        # Falla si gofmt reporta cualquier archivo sin formatear.
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt encontró archivos sin formatear:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        run: go test ./... -race -count=1

  drift:
    name: spec drift-guard
    # No bloquea el merge: compara el spec embebido con el vivo de api.factuarea.com
    # y puede fallar por causas ajenas al PR (prod adelantado, red caída).
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: drift-guard
        # Si falla, regenerar el spec embebido con `make generate` (o `make generate-dev`).
        env:
          FACTUAREA_CHECK_DRIFT: "1"
        run: go test ./internal/spec/ -run TestSpecOperationParity -count=1
